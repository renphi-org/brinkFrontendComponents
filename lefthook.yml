pre-commit:
  parallel: false
  commands:
    build:
      glob: '*'
      run: |
        echo "Building library..."
        npm run build
      skip:
        - merge
        - rebase
    stage-dist:
      glob: '*'
      run: git add dist/
      skip:
        - merge
        - rebase
    lint:
      glob: '*.{ts,vue,js,json,css}'
      run: npx biome check --write {staged_files}
      stage_fixed: true
